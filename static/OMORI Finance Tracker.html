<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Catsium's Finance Tracker</title>
<!-- lowk learning how to do icons and this took me a long time for some reason-->

<link rel="stylesheet" href="omori-finance.css" />
<link rel="icon" type="image/png" href="/static/icon.png" />

<!-- theme consistency -->
<script>
(function () {
  try {
    var th = localStorage.getItem('omori-theme2') || 'light';
    var de = document.documentElement;
    if (th !== 'light') de.classList.add('theme-' + th);
    de.style.colorScheme = (th === 'dark' || th === 'ink') ? 'dark' : 'light';
  } catch (e) {}
})();
</script>
<style>
  /* full-screen cover shown until the React app has loaded — kills the brief
     flash of unstyled HTML while Babel compiles. Colour follows the theme. */
  #boot-splash {
    position: fixed; inset: 0; z-index: 99999;
    background: var(--paper, #fbfbf8);
    transition: opacity 0.45s ease;
  }
  #boot-splash.hide { opacity: 0; pointer-events: none; }
</style>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#bcd9f0" />
    <rect x="20" y="20" width="60" height="60" rx="3" fill="#fbfbf8" stroke="#161616" stroke-width="3" />
    <circle cx="50" cy="48" r="16" fill="none" stroke="#161616" stroke-width="3" />
    <path d="M50 48 L50 33 A15 15 0 0 1 63 55 Z" fill="#f8c8d8" stroke="#161616" stroke-width="2" />
    <text x="50" y="52" font-family="monospace" font-size="9" text-anchor="middle" fill="#161616">$</text>
  </svg>
</template>
</head>
<body>
<div id="boot-splash"></div>
<div id="root"></div>

<!-- React + Babel (pinned) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- data layer (plain JS) -->
<script src="data.js"></script>

<!-- app modules (Babel) -->
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="wobble.jsx"></script>
<script type="text/babel" src="charts.jsx"></script>
<script type="text/babel" src="stickers.jsx"></script>
<script type="text/babel" src="panels.jsx"></script>
<script type="text/babel" src="modals.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
